<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tex — The Fizz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400..500&family=Michroma&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#0a0a0a; --ink3:#8f8f8f; --ink4:#b8b8b8;
  --mono:"Geist Mono",monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#fff;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
/* the canvas IS the whole screen — the fizz, alone, nothing else */
#hash{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%)}
</style>
</head>
<body>
<canvas id="hash"></canvas>

<script>
/* THE FIZZ — isolated.
   The one thing Matt wants to keep: the sealed sha256 swarming onto a
   pure-white screen out of ~2,200 achromatic particles, then living as
   crisp Geist-Mono text. Every grey is rgb(v,v,v) — provably no tint.
   Canvas2D, no WebGL. Because the points are sampled from the REAL hash
   bytes, the swarm is data, not decoration: this exact hash makes this
   exact cloud. */
const HASH = "9f2c4a7b8e1d3056c2a9f1e4b7d80c6a5f3e2b1d9c8a7065f4e3d2c1b0a9f8e7d";
const cv = document.getElementById('hash');
const ctx = cv.getContext('2d');
const wait = (ms)=>new Promise(r=>setTimeout(r,ms));

let CSSW=900, CSSH=90, DPR=Math.min(devicePixelRatio||1,2);
let points=[]; let state='hidden'; let t0=0; let hashFont=15;

/* deterministic pseudo-random so the cloud is identical every loop */
function hash01(i){ const x=Math.sin(i*127.1+13.7)*43758.5453; return x-Math.floor(x); }
function h2(ix,iy){ const h=Math.sin(ix*127.1+iy*311.7)*43758.5453; return h-Math.floor(h); }
function vnoise(x,y){ const ix=Math.floor(x),iy=Math.floor(y),fx=x-ix,fy=y-iy;
  const a=h2(ix,iy),b=h2(ix+1,iy),c=h2(ix,iy+1),d=h2(ix+1,iy+1);
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
  return a*(1-ux)*(1-uy)+b*ux*(1-uy)+c*(1-ux)*uy+d*ux*uy; }
/* cubic-bezier solver so the swarm eases exactly like the CSS curves */
const bz=(p1,p2,p3,p4)=>{ return (t)=>{ let x=t;
  for(let k=0;k<5;k++){ const cx=3*p1,bx=3*(p3-p1)-cx,ax=1-cx-bx;
    const fx=((ax*x+bx)*x+cx)*x - t; const dx=(3*ax*x+2*bx)*x+cx; if(Math.abs(dx)<1e-5)break; x-=fx/dx; }
  const cy=3*p2,by=3*(p4-p2)-cy,ay=1-cy-by; return ((ay*x+by)*x+cy)*x; }; };
const easeForm=bz(.16,1,.3,1);

function sizeCanvas(){
  CSSW=Math.min(window.innerWidth-64, 1040); CSSH=90;
  cv.width=CSSW*DPR; cv.height=CSSH*DPR;
  cv.style.width=CSSW+'px'; cv.style.height=CSSH+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
function buildPoints(){
  const off=document.createElement('canvas'); const o=off.getContext('2d');
  off.width=CSSW*DPR; off.height=CSSH*DPR; o.scale(DPR,DPR);
  o.fillStyle='#000'; o.textBaseline='middle';
  let fs=16; o.font=fs+'px "Geist Mono", monospace';
  while(o.measureText(HASH).width>CSSW-2 && fs>8){ fs-=0.5; o.font=fs+'px "Geist Mono", monospace'; }
  hashFont=fs;
  const tw=o.measureText(HASH).width; const ox=(CSSW-tw)/2; /* centred */
  o.fillText(HASH, ox, CSSH/2);
  const img=o.getImageData(0,0,off.width,off.height).data;
  points=[];
  for(let y=0;y<off.height;y+=2){
    for(let x=0;x<off.width;x+=2){
      if(img[(y*off.width+x)*4+3]>110){
        const tx=x/DPR, ty=y/DPR, i=points.length;
        const ang=hash01(i*1.7)*Math.PI*2, rad=30+hash01(i*2.3)*120;
        points.push({tx,ty, sx:tx+Math.cos(ang)*rad, sy:ty+Math.sin(ang)*rad,
          phi:hash01(i)*Math.PI*2, f:0.6+hash01(i+9)*0.5,
          g:26+vnoise(tx*0.05,ty*0.05)*46, ox});
      }
    }
  }
  if(points.length>2400){ const keep=2200/points.length; points=points.filter((_,i)=>hash01(i*3.1)<keep); }
  hashOX = points.length ? points[0].ox : (CSSW-CSSW)/2;
}
let hashOX=0;

function setState(s){ state=s; t0=performance.now(); }

function draw(now){
  ctx.clearRect(0,0,CSSW,CSSH);
  if(state==='hidden'){ requestAnimationFrame(draw); return; }
  const t=(now-t0)/1000, clock=now/1000;

  /* LIVING / FADING — the resolved crisp hash with a sub-pixel breath */
  if(state==='living' || state==='fading'){
    let a=0.94+0.06*Math.sin(clock*1.8);
    if(state==='fading') a*=Math.max(0,1-t/0.6);
    const by=Math.sin(clock*1.8)*0.5;
    ctx.globalAlpha=a; ctx.fillStyle='#1f1f1f'; ctx.textBaseline='middle';
    ctx.font=hashFont+'px "Geist Mono", monospace';
    ctx.fillText(HASH, hashOX, CSSH/2+by); ctx.globalAlpha=1;
    requestAnimationFrame(draw); return;
  }

  /* FORMING — the fizz: particles swarm in to their target glyph pixels */
  const p=easeForm(Math.min(t/1.6,1));
  for(let k=0;k<points.length;k++){
    const pt=points[k];
    let x=pt.sx+(pt.tx-pt.sx)*p, y=pt.sy+(pt.ty-pt.sy)*p, alpha=p*p;
    if(p>=1){ x=pt.tx+Math.sin(clock*pt.f*6.283+pt.phi)*0.8;
              y=pt.ty+Math.cos(clock*pt.f*0.7*6.283+pt.phi)*0.8; }
    if(alpha<=0.01) continue;
    ctx.globalAlpha=alpha; const g=Math.round(pt.g);
    ctx.fillStyle='rgb('+g+','+g+','+g+')';
    ctx.fillRect(x,y,1.3,1.3);
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(draw);
}

let running=true;
async function loop(){
  while(running){
    setState('forming'); await wait(1600);   /* the fizz */
    setState('living');  await wait(2800);    /* breathe, crisp */
    setState('fading');  await wait(600);      /* soft exit */
    setState('hidden');  await wait(700);      /* a beat of pure white */
  }
}

function boot(){
  sizeCanvas(); buildPoints(); requestAnimationFrame(draw); loop();
  window.__fizzReady=true;
}
document.fonts.ready.then(boot);
setTimeout(()=>{ if(!window.__fizzReady) boot(); }, 900);
window.addEventListener('resize',()=>{ DPR=Math.min(devicePixelRatio||1,2); sizeCanvas(); buildPoints(); });
</script>
</body>
</html>
