    <!-- One voice: Inter — a clean humanist sans, the screen-native heir to
         Helvetica / San Francisco. It carries every human word and every label in
         the product; hierarchy is built from size, tracking, ink-value and case.
         Geist Mono is loaded for ONE thing only: raw machine identifiers (a sha256
         handle), where a proportional face would be harder to read and copy.
         Nothing else is loaded — the system is committed to the one voice. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400..500&family=Inter:wght@400..600&display=swap"
      rel="stylesheet"
    />
