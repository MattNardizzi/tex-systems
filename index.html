    <!-- One voice: Inter — every human word and label; Geist Mono for ONE
         thing only, raw machine identifiers (a sha256 handle). SELF-HOSTED:
         two same-origin latin-subset variable woff2 files, preloaded, with
         font-display: optional — so the type is either there at first paint
         or a metric-matched fallback renders and NEVER swaps. No third-party
         CSS on the render path, no reflow when the real face lands. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/inter-var.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/geist-mono-var.woff2"
      crossorigin
    />

    <style>
      @font-face {
        font-family: "Inter";
        font-style: normal;
        font-weight: 300 500;
        font-display: optional;
        src: url(/fonts/inter-var.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
          U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122,
          U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Geist Mono";
        font-style: normal;
        font-weight: 400 500;
        font-display: optional;
        src: url(/fonts/geist-mono-var.woff2) format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6,
          U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122,
          U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      /* The stand-in for the rare first view that misses the optional window:
         Arial adjusted to Inter's metrics, so if it ever renders, nothing
         shifts — because with font-display: optional, nothing ever swaps. */
      @font-face {
        font-family: "Inter Fallback";
        src: local("Arial");
        size-adjust: 107.06%;
        ascent-override: 90.49%;
        descent-override: 22.56%;
        line-gap-override: 0%;
      }

      /* Static shell — a SIBLING overlay of #root: visible before the app
         mounts, and to crawlers/no-JS. main.jsx lifts it (one quiet opacity
         dissolve) after the app's first paint, so the mount is felt, not a
         one-frame content swap. */
      .tex-static {
        position: fixed;
        inset: 0;
        z-index: 100;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #ffffff;
        font-family: "Inter", "Inter Fallback", system-ui, -apple-system, sans-serif;
        color: #0a0a0a;
        text-align: center;
        padding: 0 24px;
        transition: opacity 180ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      .tex-static.is-lifting {
        opacity: 0;
        pointer-events: none;
      }
      .tex-static__mark {
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
      }
      .tex-static__line {
        font-size: 15px;
        font-weight: 300;
        color: #6b6b6b;
        max-width: 34em;
        line-height: 1.6;
      }
      .tex-static__link {
        font-size: 13px;
        color: #0a0a0a;
        text-decoration: none;
        border-bottom: 1px solid rgba(10, 10, 10, 0.25);
        padding-bottom: 1px;
      }
      /* One permanent, faint line so the surface is never wordless to a stranger. */
      .tex-foot {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 14px;
        display: flex;
        justify-content: center;
        gap: 0.5em;
        font-family: "Inter", "Inter Fallback", system-ui, -apple-system, sans-serif;
        font-size: 11.5px;
        font-weight: 400;
        color: rgba(10, 10, 10, 0.32);
        z-index: 2147483000;
        pointer-events: none;
      }
      .tex-foot a {
        color: rgba(10, 10, 10, 0.45);
        text-decoration: none;
        pointer-events: auto;
      }
      .tex-foot a:hover {
        color: rgba(10, 10, 10, 0.85);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="tex-static" id="tex-static">
      <div class="tex-static__mark">TEX</div>
      <div class="tex-static__line">
        Runtime governance for AI agents. PERMIT / ABSTAIN / FORBID — enforced
        in-path. Every ruling seals into a receipt that verifies offline.
      </div>
      <a class="tex-static__link" href="https://github.com/MattNardizzi/tex"
        >github.com/MattNardizzi/tex</a
      >
    </div>
    <div class="tex-foot">
      <span>Runtime governance for AI agents</span>
      <span>·</span>
      <a href="https://github.com/MattNardizzi/tex">GitHub</a>
    </div>
    <noscript>
      Tex — runtime governance for AI agents.
      <a href="https://github.com/MattNardizzi/tex">github.com/MattNardizzi/tex</a>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
