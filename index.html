    <!-- The voice: EB Garamond — a faithful revival of Claude Garamont's 1592
         Egenolff-Berner specimen (the "EB"), the same source every premium
         Garamond traces back to. This is Tex speaking, and it is the same well
         Apple spoke from: from 1984 to 2002 Apple's voice WAS Garamond. A
         sovereign cognition does not get labelled in gray sans — it declares
         itself in a serif with four centuries of authority behind it. Free,
         open-licensed, variable (weight + italic). Note: Google's cut exposes
         wght + ital only — no optical-size axis — so the display craft lives in
         weight, tracking, leading, and warm ink, never in opsz. The chrome and
         the one machine object stay Geist / Geist Mono: objects are not the
         voice, and must never be set in it. -->
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Geist:wght@300..600&family=Geist+Mono:wght@400..500&family=Orbitron:wght@400..600&display=swap"
      rel="stylesheet"
    />
